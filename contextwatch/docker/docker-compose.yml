services:
  neo4j:
    image: neo4j:5.13-community
    ports: ["7474:7474", "7687:7687"]
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH}
    volumes:
      - neo4j_data:/data

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports: ["8000:8000"]
    depends_on: [neo4j]
    env_file:
      - ../.env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      CHROMA_PERSIST_DIR: /app/data/chroma_db
      STORE_DB_PATH: /app/data/contextwatch.db
    volumes:
      - ../data:/app/data
      - chroma_data:/app/data/chroma_db

  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    ports: ["8501:8501"]
    depends_on: [api]
    environment:
      API_URL: http://api:8000

volumes:
  neo4j_data:
  chroma_data:
